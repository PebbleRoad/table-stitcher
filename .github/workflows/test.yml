name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    # Fast layer. Runs on every push/PR. No parser, no OCR.
    name: unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: unit tests
        # Default addopts in pyproject excludes the integration marker, so
        # this run is already unit-only. -v adds per-case outcomes.
        run: pytest tests/ -v

  integration:
    # Slow layer. Docling downloads layout / table-structure / OCR models on
    # first run (~2 min); we cache ~/.cache/huggingface so repeat runs stay
    # under ~4 min including the actual assertions.
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: cache docling models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: docling-models-${{ runner.os }}-v1
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: integration tests
        # Integration tests are gated behind the `integration` marker in
        # pyproject; opt in explicitly here.
        run: pytest -m integration tests/ -v
