description: Three independent clinical lab panels (Metabolic, Liver Function, Lipid Profile) each on
  their own page with no column header row. Docling assigns no column_header cells so the adapter marks
  all three is_headerless=True and generates Column_0..3 names. All panels have 4 columns. Previously
  the pipeline merged all three into one 22-row table via headerless_width_match because same column count
  was the only check. The fix requires layout corroboration (tA near page bottom >= 0.60) when both sides
  are headerless — these panels end mid-page (vert_bottom 0.46, 0.30) and correctly remain separate.
